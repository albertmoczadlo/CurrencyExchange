name: CI

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: |
            src/**/*.csproj

      - name: Restore
        run: dotnet restore src/VistulaExchange.sln

      - name: Build
        run: dotnet build src/VistulaExchange.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test src/VistulaExchange.Tests/VistulaExchange.Tests.csproj --no-build --no-restore --configuration Release --verbosity minimal
